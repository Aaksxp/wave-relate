<div class="app-shell">
  <aside class="sidebar glass" [class.collapsed]="sidebarCollapsed">
    <div class="sidebar-top">
      <button type="button" class="brand" (click)="goHome()" title="Go to home">
        <img src="/favicon.ico" alt="WaveRelate logo" class="brand-icon">
        <span class="title">Wave Family</span>
      </button>
      <button type="button" class="collapse-toggle" (click)="toggleSidebar()" [title]="sidebarCollapsed ? 'Expand sidebar' : 'Collapse sidebar'">
        <i class="bi" [class.bi-chevron-right]="sidebarCollapsed" [class.bi-chevron-left]="!sidebarCollapsed"></i>
      </button>
    </div>

    <nav class="side-nav">
      <a routerLink="/persons" routerLinkActive="active" class="nav-link" title="People">
        <i class="bi bi-people-fill"></i>
        <span>People</span>
      </a>
    </nav>

    <button type="button" class="theme-toggle" (click)="toggleTheme()" [title]="isDarkMode ? 'Switch to light mode' : 'Switch to dark mode'">
      <i class="bi" [class.bi-sun-fill]="isDarkMode" [class.bi-moon-stars-fill]="!isDarkMode"></i>
      <span>{{ isDarkMode ? 'Light mode' : 'Dark mode' }}</span>
    </button>
  </aside>

  <main class="app-main">
    <router-outlet></router-outlet>
  </main>
</div>
