<section class="persons">
  <div class="d-flex flex-column flex-md-row justify-content-between align-items-start gap-3 mb-4">
    <div>
      <h2 class="mb-1">People</h2>
      <p class="text-muted mb-0">Search, add, and manage people in your family tree.</p>
    </div>
    <div class="d-flex flex-wrap gap-2">
      <input class="form-control form-control-sm" placeholder="Search people" [(ngModel)]="q" (keyup.enter)="search()" />
      <button class="btn btn-primary btn-sm" title="Search" (click)="search()"><i class="bi bi-search"></i></button>
      <button class="btn btn-primary btn-sm" title="New person" (click)="goCreate()"><i class="bi bi-plus"></i></button>
    </div>
  </div>

  <div *ngIf="loading" class="text-muted">Loading people...</div>

  <div *ngIf="!loading && people.length === 0" class="text-muted">No people found yet. Add someone to begin.</div>

  <div *ngIf="!loading && people.length > 0" class="list-group shadow-sm">
    <div *ngFor="let p of people" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center gap-3 py-3">
      <div class="person-info d-flex align-items-center gap-3" role="button" (click)="router.navigate(['/persons', p.id, 'family-tree'])">
        <div class="avatar-circle avatar-sm">{{ getInitials(p) }}</div>
        <div>
          <div class="fw-semibold">{{ p.firstName }} {{ p.lastName }}</div>
          <div class="text-muted small">{{ p.email || p.phone || 'No contact' }}</div>
        </div>
      </div>
      <div class="btn-group btn-group-sm">
        <button class="btn btn-outline-secondary" title="View details" (click)="router.navigate(['/persons', p.id, 'details'])"><i class="bi bi-eye"></i></button>
        <button class="btn btn-outline-secondary" title="Family tree" (click)="router.navigate(['/persons', p.id, 'family-tree'])"><i class="bi bi-diagram-3"></i></button>
        <button class="btn btn-outline-secondary" title="Edit" (click)="edit(p)"><i class="bi bi-pencil"></i></button>
        <button class="btn btn-outline-danger" title="Delete" (click)="delete(p)"><i class="bi bi-trash"></i></button>
      </div>
    </div>
  </div>
</section>
