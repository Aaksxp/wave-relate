services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: wave-family-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStrong!Passw0rd"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  server:
    build:
      context: ./WaveRelate.Server
      dockerfile: Dockerfile
    container_name: wave-family-server
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=WaveRelateDb;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True;MultipleActiveResultSets=true"
    ports:
      - "5097:8080"
    depends_on:
      sqlserver:
        condition: service_healthy

  client:
    build:
      context: ./WaveRelate.Client
      dockerfile: Dockerfile
    container_name: wave-family-client
    ports:
      - "4200:80"
    depends_on:
      - server

volumes:
  sqlserver-data:
